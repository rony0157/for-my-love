<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>পাপড়ির জন্য প্রতিদিনের সারপ্রাইজ 🌹</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="rose-container" id="roseContainer"></div>

    <div class="card">
        <h1 class="title">আমার পাপড়ি 💖</h1>
        
        <div class="rose-icon" id="dailyRose">🌹</div>
        
        <p class="message" id="loveMessage">লোডিং...</p>
        
        <button class="gift-btn" onclick="openGift()">আজকের সারপ্রাইজ বক্স খোলো 🎁</button>
        
        <div class="gift-display id-hidden" id="giftDisplay">
            <h3>আজকের বিশেষ উপহার:</h3>
            <p id="giftContent"></p>
        </div>
    </div>

    <script href="script.js"></script>
</body>
</html>
